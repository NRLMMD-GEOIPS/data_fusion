testing:
- title: Move TC outputs to include storm time in filenames
  description: |
    With the update to include storm time in the area_id (and use sector_info["storm_id"]
    for filtering), geoips_fname outputs for TC sectors now includes the storm time
    in the filenames.

    tc_fname outputs are unchanged, because they did not include the sector name directly,
    but specific fields from the storm name/basin/etc.

    Each filename updated from

    * tc2022wp14muifa to tc2022wp14muifa20220911T1200

    Note since these were explicitly using the geoips_fname (which uses the
    general area_id rather than anything storm specific), we updated the outputs
    to use the very specific StormidStartdatetime area_id. tc_fname filename
    formatter we updated to use sector_info["storm_id"], since it is TC specific,
    and we don't generally want to include storm start datetime in TC filenames.
  files:
